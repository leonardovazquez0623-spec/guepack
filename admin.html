<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GUEPACK – Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/Icono_gp.png">
<meta name="theme-color" content="#1a4fa0">
<link rel="icon" type="image/png" href="/Icono_gp.png">
<style>
  :root {
    --blue: #1a4fa0;
    --blue-dark: #0e3070;
    --blue-light: #2563c4;
    --orange: #f05a1a;
    --orange-light: #ff7a3d;
    --white: #ffffff;
    --gray-light: #f4f6fb;
    --gray: #e0e6f0;
    --gray-mid: #8fa3c0;
    --text: #1a2740;
    --success: #22c55e;
    --shadow: 0 4px 24px rgba(26,79,160,0.13);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Montserrat', sans-serif; background: var(--gray-light); color: var(--text); min-height: 100vh; }

  .app-header {
    background: linear-gradient(135deg, var(--blue-dark) 0%, var(--blue) 60%, var(--blue-light) 100%);
    padding: 22px 20px 28px;
  }
  .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .brand-name { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: white; letter-spacing: 2px; }
  .brand-name span { color: var(--orange); }
  .brand-badge { background: var(--orange); color: white; font-size: 9px; font-weight: 900; padding: 3px 7px; border-radius: 4px; }
  .header-sub { color: rgba(255,255,255,0.65); font-size: 11px; font-weight: 600; letter-spacing: 1.5px; text-transform: uppercase; }
  .btn-logout { background: rgba(255,255,255,0.15); border: none; color: white; font-family: 'Montserrat', sans-serif; font-weight: 700; font-size: 11px; padding: 6px 12px; border-radius: 8px; cursor: pointer; margin-top: 8px; letter-spacing: 1px; transition: background .2s; }
  .btn-logout:hover { background: var(--orange); }

  .container { padding: 16px; max-width: 480px; margin: 0 auto; padding-bottom: 20px; }
  .card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 14px; box-shadow: var(--shadow); }
  .card-title { font-size: 11px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; color: var(--blue); margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .card-title::after { content: ''; flex: 1; height: 2px; background: linear-gradient(90deg, var(--orange), transparent); border-radius: 2px; }

  .stats-row { display: grid; grid-template-columns: repeat(3,1fr); gap: 10px; margin-bottom: 14px; }
  .stat-box { background: white; border-radius: 12px; padding: 14px 10px; text-align: center; box-shadow: var(--shadow); }
  .stat-number { font-family: 'Bebas Neue', sans-serif; font-size: 32px; color: var(--blue); line-height: 1; }
  .stat-number.orange { color: var(--orange); }
  .stat-label { font-size: 9px; font-weight: 700; color: var(--gray-mid); letter-spacing: 1px; text-transform: uppercase; margin-top: 2px; }

  .order-card { background: white; border-radius: 14px; padding: 16px; margin-bottom: 12px; box-shadow: var(--shadow); border-left: 4px solid var(--blue); }
  .order-card.urgent { border-left-color: var(--orange); }
  .order-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
  .order-id { font-size: 10px; font-weight: 900; color: var(--gray-mid); letter-spacing: 1px; }
  .order-client { font-size: 14px; font-weight: 700; margin-bottom: 4px; }
  .order-details { font-size: 11px; color: var(--gray-mid); font-weight: 600; margin-bottom: 10px; }
  .order-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .status-badge { padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 900; text-transform: uppercase; }
  .badge-pending { background: rgba(240,90,26,0.12); color: var(--orange); }
  .badge-transit { background: rgba(26,79,160,0.12); color: var(--blue); }
  .badge-done { background: rgba(34,197,94,0.12); color: var(--success); }
  .tag { display: inline-block; padding: 3px 9px; border-radius: 20px; font-size: 10px; font-weight: 900; margin-right: 4px; }
  .tag-blue { background: rgba(26,79,160,0.1); color: var(--blue); }
  .tag-orange { background: rgba(240,90,26,0.1); color: var(--orange); }
  .btn { padding: 8px 14px; border: none; border-radius: 8px; font-family: 'Montserrat', sans-serif; font-size: 11px; font-weight: 900; cursor: pointer; }
  .btn-secondary { background: var(--blue); color: white; }
  .empty-state { text-align: center; padding: 40px 20px; color: var(--gray-mid); }
  .empty-icon { font-size: 48px; display: block; margin-bottom: 12px; }
  .empty-text { font-size: 13px; font-weight: 700; }

  .form-group { margin-bottom: 14px; }
  .form-label { display: block; font-size: 11px; font-weight: 700; color: var(--gray-mid); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 6px; }
  .form-input { width: 100%; padding: 12px 14px; border: 2px solid var(--gray); border-radius: 10px; font-family: 'Montserrat', sans-serif; font-size: 13px; font-weight: 600; color: var(--text); background: var(--gray-light); }
  .form-input:focus { outline: none; border-color: var(--blue); background: white; }
  .size-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .size-option { border: 2px solid var(--gray); border-radius: 12px; padding: 14px 10px; text-align: center; cursor: pointer; background: var(--gray-light); }
  .size-option.selected { border-color: var(--blue); background: rgba(26,79,160,0.06); }
  .size-icon { font-size: 26px; display: block; margin-bottom: 4px; }
  .size-name { font-size: 12px; font-weight: 900; color: var(--blue); display: block; }
  .zone-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .zone-option { border: 2px solid var(--gray); border-radius: 10px; padding: 10px 6px; text-align: center; cursor: pointer; background: var(--gray-light); }
  .zone-option.selected { border-color: var(--orange); background: rgba(240,90,26,0.07); }
  .zone-name { font-size: 11px; font-weight: 900; color: var(--text); display: block; }
  .zone-icon { font-size: 18px; display: block; margin-bottom: 3px; }
  .quote-box { background: linear-gradient(135deg, var(--blue-dark), var(--blue)); border-radius: 14px; padding: 18px 20px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
  .quote-price { font-family: 'Bebas Neue', sans-serif; font-size: 48px; color: var(--orange); line-height: 1; }
  .btn-primary { background: linear-gradient(135deg, var(--orange), var(--orange-light)); color: white; width: 100%; padding: 15px; border-radius: 12px; font-size: 13px; font-weight: 900; letter-spacing: 1.5px; text-transform: uppercase; box-shadow: 0 4px 14px rgba(240,90,26,0.35); }

  .tabs { display: flex; background: white; border-radius: 12px; padding: 4px; margin-bottom: 16px; box-shadow: var(--shadow); gap: 4px; }
  .tab { flex: 1; padding: 10px; text-align: center; border-radius: 8px; font-size: 11px; font-weight: 900; cursor: pointer; color: var(--gray-mid); letter-spacing: 0.5px; border: none; background: transparent; font-family: 'Montserrat', sans-serif; }
  .tab.active { background: var(--blue); color: white; }
  .tab-content { display: none; }
  .tab-content.active { display: block; }
</style>
</head>
<body>

<div class="app-header">
  <div style="display:flex;justify-content:space-between;align-items:flex-start">
    <div>
      <div class="brand">
        <div class="brand-name">GUE<span>PAC</span>K</div>
        <div class="brand-badge">ADMIN</div>
      </div>
      <div class="header-sub">Panel de Control</div>
    </div>
    <button onclick="cerrarSesion()" class="btn-logout">🚪 Salir</button>
  </div>
</div>

<div class="container" style="padding-top:16px">

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" onclick="showTab('pedidos')">📋 Pedidos</button>
    <button class="tab" onclick="showTab('nuevo')">➕ Nuevo pedido</button>
  </div>

  <!-- TAB PEDIDOS -->
  <div id="tab-pedidos" class="tab-content active">
    <div class="stats-row">
      <div class="stat-box">
        <div class="stat-number orange" id="stat-pendientes">0</div>
        <div class="stat-label">Pendientes</div>
      </div>
      <div class="stat-box">
        <div class="stat-number" id="stat-ruta">0</div>
        <div class="stat-label">En ruta</div>
      </div>
      <div class="stat-box">
        <div class="stat-number" style="color:var(--success)" id="stat-entregados">0</div>
        <div class="stat-label">Entregados</div>
      </div>
    </div>

   <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
  <div class="card-title" style="padding:0;margin:0">📋 Pedidos</div>
  <div style="display:flex;gap:6px">
    <button onclick="filtrarFecha(0)" id="btn-hoy" class="btn btn-secondary" style="padding:6px 12px;font-size:10px;border-radius:8px">Hoy</button>
    <button onclick="filtrarFecha(1)" id="btn-ayer" class="btn" style="padding:6px 12px;font-size:10px;border-radius:8px;background:var(--gray);color:var(--text)">Ayer</button>
    <button onclick="filtrarFecha(2)" id="btn-2dias" class="btn" style="padding:6px 12px;font-size:10px;border-radius:8px;background:var(--gray);color:var(--text)">Hace 2 días</button>
  </div>
</div>
<div style="display:flex;justify-content:flex-end;margin-bottom:12px">
  <button onclick="exportarExcel()" style="background:var(--success);color:white;border:none;border-radius:8px;padding:8px 14px;font-family:Montserrat,sans-serif;font-weight:900;font-size:11px;cursor:pointer;letter-spacing:0.5px">📊 Exportar Excel</button>
</div>
    <div id="lista-pedidos">
      <div class="empty-state">
        <span class="empty-icon">📦</span>
        <div class="empty-text">Cargando pedidos...</div>
      </div>
    </div>
  </div>

  <!-- TAB NUEVO PEDIDO -->
  <div id="tab-nuevo" class="tab-content">
    <div class="card">
      <div class="card-title">📬 Datos del envío</div>
      <div class="form-group">
        <label class="form-label">Nombre completo</label>
        <input type="text" id="a-nombre" class="form-input" placeholder="Ej. María García">
      </div>
      <div class="form-group">
        <label class="form-label">WhatsApp</label>
        <input type="tel" id="a-whatsapp" class="form-input" placeholder="10 dígitos" maxlength="10" oninput="this.value=this.value.replace(/[^0-9]/g,'')">
      </div>
      <div class="form-group">
        <label class="form-label">Dirección recolección</label>
        <input type="text" id="a-recoleccion" class="form-input" placeholder="Calle, número, colonia">
      </div>
      <div class="form-group">
        <label class="form-label">Dirección entrega</label>
        <input type="text" id="a-entrega" class="form-input" placeholder="Calle, número, colonia">
      </div>
      <div class="form-group">
  <label class="form-label">Fecha de recolección</label>
  <div style="display:flex;gap:8px;margin-bottom:8px">
    <button type="button" id="a-btn-hoy" onclick="aSeleccionarFecha('hoy')" style="flex:1;padding:10px;border:2px solid var(--gray);border-radius:10px;background:var(--gray-light);font-family:Montserrat,sans-serif;font-weight:900;font-size:11px;cursor:pointer;color:var(--text)">📅 Hoy</button>
    <button type="button" id="a-btn-manana" onclick="aSeleccionarFecha('mañana')" style="flex:1;padding:10px;border:2px solid var(--gray);border-radius:10px;background:var(--gray-light);font-family:Montserrat,sans-serif;font-weight:900;font-size:11px;cursor:pointer;color:var(--text)">📅 Mañana</button>
    <button type="button" id="a-btn-otra" onclick="aSeleccionarFecha('otra')" style="flex:1;padding:10px;border:2px solid var(--gray);border-radius:10px;background:var(--gray-light);font-family:Montserrat,sans-serif;font-weight:900;font-size:11px;cursor:pointer;color:var(--text)">🗓️ Otra</button>
  </div>
  <input type="date" id="a-input-fecha-custom" class="form-input" style="display:none">
  <input type="hidden" id="a-fecha-seleccionada">
  <div id="a-aviso-fecha" style="display:none;padding:12px 16px;border-radius:10px;margin-top:10px;font-size:12px;font-weight:700;text-align:center"></div>
</div>
    </div>

    <div class="card">
      <div class="card-title">📐 Tamaño</div>
      <div class="size-grid">
        <div class="size-option" id="a-sz-sobre" onclick="selectSize('sobre')">
          <span class="size-icon">✉️</span>
          <span class="size-name">Sobre / Chico</span>
        </div>
        <div class="size-option" id="a-sz-grande" onclick="selectSize('grande')">
          <span class="size-icon">📦</span>
          <span class="size-name">Grande</span>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">🗺️ Zona</div>
      <div class="zone-grid">
        <div class="zone-option" id="a-zn-centro" onclick="selectZone('centro')">
          <span class="zone-icon">🏙️</span>
          <span class="zone-name">Centro GDL</span>
        </div>
        <div class="zone-option" id="a-zn-norte" onclick="selectZone('norte')">
          <span class="zone-icon">⬆️</span>
          <span class="zone-name">Zona Norte</span>
        </div>
        <div class="zone-option" id="a-zn-sur" onclick="selectZone('sur')">
          <span class="zone-icon">⬇️</span>
          <span class="zone-name">Zona Sur</span>
        </div>
      </div>
    </div>

    <div id="a-quote" class="quote-box" style="display:none">
      <div>
        <div style="color:rgba(255,255,255,0.7);font-size:11px;font-weight:700;letter-spacing:1px">COSTO DE ENVÍO</div>
        <div class="quote-price" id="a-quote-amount">$0</div>
        <div style="color:rgba(255,255,255,0.55);font-size:10px;font-weight:600" id="a-quote-detail">—</div>
      </div>
      <div style="font-size:36px">🚀</div>
    </div>

    <button class="btn btn-primary" onclick="crearPedidoAdmin()">Crear Pedido →</button>
  </div>

</div>

<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SUPABASE_URL = 'https://zkrnjdsnuyjaxxnluzmn.supabase.co'
const SUPABASE_KEY = 'sb_publishable_OjSM3JPqRsP87pru1Q1Yzw_9vGG7EFb'
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

let selSize = null, selZone = null
const prices = {
  centro: { sobre: 110, grande: 150 },
  norte: { sobre: 150, grande: 200 },
  sur: { sobre: 150, grande: 200 }
}

async function init() {
  const { data: { session } } = await db.auth.getSession()
  if (!session) { window.location.href = 'login.html'; return; }
  const { data } = await db.from('usuarios').select('rol').eq('email', session.user.email).single()
  if (!data || data.rol !== 'admin') { window.location.href = 'login.html'; return; }
  cargarPedidos()
}

function showTab(tab) {
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'))
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'))
  document.getElementById('tab-' + tab).classList.add('active')
  event.target.classList.add('active')
}
function aSeleccionarFecha(opcion) {
  const hoy = new Date()
  const mañana = new Date()
  mañana.setDate(mañana.getDate() + 1)
  const formatear = (d) => d.toISOString().split('T')[0]

  const btns = ['a-btn-hoy', 'a-btn-manana', 'a-btn-otra']
  btns.forEach(id => {
    const btn = document.getElementById(id)
    if (btn) {
      btn.style.background = 'var(--gray-light)'
      btn.style.color = 'var(--text)'
      btn.style.borderColor = 'var(--gray)'
    }
  })

  if (opcion === 'hoy') {
    document.getElementById('a-fecha-seleccionada').value = formatear(hoy)
    document.getElementById('a-input-fecha-custom').style.display = 'none'
    const btn = document.getElementById('a-btn-hoy')
    btn.style.background = 'var(--blue)'; btn.style.color = 'white'; btn.style.borderColor = 'var(--blue)'
    aVerificarDisponibilidad(formatear(hoy))
  } else if (opcion === 'mañana') {
    document.getElementById('a-fecha-seleccionada').value = formatear(mañana)
    document.getElementById('a-input-fecha-custom').style.display = 'none'
    const btn = document.getElementById('a-btn-manana')
    btn.style.background = 'var(--blue)'; btn.style.color = 'white'; btn.style.borderColor = 'var(--blue)'
    aVerificarDisponibilidad(formatear(mañana))
  } else {
    document.getElementById('a-input-fecha-custom').style.display = 'block'
    document.getElementById('a-input-fecha-custom').onchange = (e) => {
      document.getElementById('a-fecha-seleccionada').value = e.target.value
      aVerificarDisponibilidad(e.target.value)
    }
    const btn = document.getElementById('a-btn-otra')
    btn.style.background = 'var(--blue)'; btn.style.color = 'white'; btn.style.borderColor = 'var(--blue)'
  }
}

async function aVerificarDisponibilidad(fecha) {
  const inicio = new Date(fecha + 'T00:00:00').toISOString()
  const fin = new Date(fecha + 'T23:59:59').toISOString()
  const { data } = await db.from('pedidos').select('id').gte('created_at', inicio).lte('created_at', fin)
  const total = data ? data.length : 0
  const hora = new Date().getHours()
  const hoy = new Date().toISOString().split('T')[0]
  const esHoy = fecha === hoy
  const aviso = document.getElementById('a-aviso-fecha')

  if (esHoy && hora >= 15) {
    aviso.style.display = 'block'
    aviso.style.background = 'rgba(240,90,26,0.1)'
    aviso.style.color = 'var(--orange)'
    aviso.style.border = '2px solid var(--orange)'
    aviso.innerHTML = '🟠 Ya pasaron las 3 PM — recolección para mañana'
  } else if (total >= 10) {
    aviso.style.display = 'block'
    aviso.style.background = 'rgba(240,90,26,0.1)'
    aviso.style.color = 'var(--orange)'
    aviso.style.border = '2px solid var(--orange)'
    aviso.innerHTML = '🟠 ' + total + ' pedidos ese día — posible entrega al día siguiente'
  } else {
    aviso.style.display = 'block'
    aviso.style.background = 'rgba(34,197,94,0.1)'
    aviso.style.color = 'var(--success)'
    aviso.style.border = '2px solid var(--success)'
    aviso.innerHTML = '🟢 ¡Disponible! Recolección el día seleccionado'
  }
}
function selectSize(sz) {
  selSize = sz
  document.querySelectorAll('.size-option').forEach(o => o.classList.remove('selected'))
  document.getElementById('a-sz-' + sz).classList.add('selected')
  updateQuote()
}

function selectZone(zone) {
  selZone = zone
  document.querySelectorAll('.zone-option').forEach(o => o.classList.remove('selected'))
  document.getElementById('a-zn-' + zone).classList.add('selected')
  updateQuote()
}

function updateQuote() {
  if (!selSize || !selZone) return
  const price = prices[selZone][selSize]
  const zoneLabel = { centro: 'Centro GDL', norte: 'Zona Norte', sur: 'Zona Sur' }[selZone]
  const sizeLabel = { sobre: 'Sobre / Chico', grande: 'Grande' }[selSize]
  document.getElementById('a-quote-amount').textContent = '$' + price
  document.getElementById('a-quote-detail').textContent = sizeLabel + ' · ' + zoneLabel
  document.getElementById('a-quote').style.display = 'flex'
}

async function crearPedidoAdmin() {
  const nombre = document.getElementById('a-nombre').value
  const whatsapp = document.getElementById('a-whatsapp').value
  const recoleccion = document.getElementById('a-recoleccion').value
  const entrega = document.getElementById('a-entrega').value
  const fecha = document.getElementById('a-fecha-seleccionada').value

  if (!nombre || !whatsapp || !recoleccion || !entrega || !fecha || !selSize || !selZone) {
    alert('Llena todos los campos y selecciona fecha, tamaño y zona'); return
  }

  const aAviso = document.getElementById('a-aviso-fecha')
  if (aAviso && aAviso.style.display !== 'none' && aAviso.innerHTML.includes('🟠')) {
    alert('⚠️ No es posible registrar por horario o capacidad. Selecciona otra fecha.')
    return
  }

  const { error } = await db.from('pedidos').insert({
    nombre, whatsapp,
    direccion_recoleccion: recoleccion,
    direccion_entrega: entrega,
    fecha, tamanio: selSize, zona: selZone,
    precio: prices[selZone][selSize],
    estado: 'Pendiente'
  })

  if (error) { alert('Error al crear pedido'); return }
  alert('✅ Pedido creado exitosamente!')
  showTab('pedidos')
  cargarPedidos()
}

let diaFiltro = 0

function filtrarFecha(dias) {
  diaFiltro = dias
  document.querySelectorAll('.btn').forEach(b => {
    if (b.id && b.id.startsWith('btn-')) {
      b.style.background = 'var(--gray)'
      b.style.color = 'var(--text)'
    }
  })
  const ids = ['btn-hoy', 'btn-ayer', 'btn-2dias']
  const btn = document.getElementById(ids[dias])
  if (btn) { btn.style.background = 'var(--blue)'; btn.style.color = 'white' }
  cargarPedidos()
}

async function cargarPedidos() {
 const fecha = new Date()
fecha.setDate(fecha.getDate() - diaFiltro)
const inicio = new Date(fecha.setHours(0,0,0,0)).toISOString()
const fin = new Date(fecha.setHours(23,59,59,999)).toISOString()

const { data, error } = await db.from('pedidos').select('*')
  .gte('created_at', inicio)
  .lte('created_at', fin)
  .order('created_at', { ascending: false })
  if (error) { console.error(error); return }

  document.getElementById('stat-pendientes').textContent = data.filter(p => p.estado === 'Pendiente').length
  document.getElementById('stat-ruta').textContent = data.filter(p => p.estado === 'En camino a entrega' || p.estado === 'A punto de llegar').length
  document.getElementById('stat-entregados').textContent = data.filter(p => p.estado === 'Entregado').length

  const contenedor = document.getElementById('lista-pedidos')
  contenedor.innerHTML = ''

  // Sin asignar
  const sinAsignar = data.filter(p => !p.repartidor)
  contenedor.innerHTML += renderAccordion('⚠️ Sin asignar', sinAsignar, 'sin-asignar', true)

  // Por repartidor
  const { data: repartidores } = await db.from('repartidores').select('*')
  repartidores.forEach(repa => {
    const pedidosRepa = data.filter(p => p.repartidor === repa.nombre)
    const activos = pedidosRepa.filter(p => p.estado !== 'Entregado').length
    const entregados = pedidosRepa.filter(p => p.estado === 'Entregado').length
    contenedor.innerHTML += renderAccordion('🏍️ ' + repa.nombre, pedidosRepa, 'repa-' + repa.id, false, activos, entregados)
  })

  if (data.length === 0) {
    contenedor.innerHTML = '<div class="empty-state"><span class="empty-icon">📦</span><div class="empty-text">No hay pedidos hoy</div></div>'
  }
}

function renderAccordion(titulo, pedidos, id, abierto, activos, entregados) {
  const badge = activos !== undefined ? 
    `<span style="color:var(--orange);font-weight:900">${activos} activos</span> · <span style="color:var(--success)">${entregados} entregados</span>` : 
    `<span style="color:var(--orange);font-weight:900">${pedidos.length} pendientes</span>`

  return `
    <div style="margin-bottom:8px">
      <div onclick="toggleAccordion('${id}')" style="display:flex;justify-content:space-between;align-items:center;background:white;border-radius:12px;padding:14px 16px;cursor:pointer;box-shadow:var(--shadow);border-left:4px solid var(--blue)">
        <div>
          <div style="font-size:13px;font-weight:900;color:var(--text)">${titulo}</div>
          <div style="font-size:11px;margin-top:2px">${badge}</div>
        </div>
        <div id="arrow-${id}" style="font-size:18px;transition:transform .3s">${abierto ? '▲' : '▶'}</div>
      </div>
      <div id="accordion-${id}" style="display:${abierto ? 'block' : 'none'};padding-top:8px">
        ${pedidos.length === 0 ? '<div style="text-align:center;padding:20px;color:var(--gray-mid);font-size:12px;font-weight:700">Sin pedidos</div>' : pedidos.map(p => renderPedido(p)).join('')}
      </div>
    </div>
  `
}
async function exportarExcel() {
  const fecha = new Date()
  fecha.setDate(fecha.getDate() - diaFiltro)
  const inicio = new Date(fecha.setHours(0,0,0,0)).toISOString()
  const fin = new Date(fecha.setHours(23,59,59,999)).toISOString()

  const { data, error } = await db.from('pedidos').select('*')
    .gte('created_at', inicio)
    .lte('created_at', fin)
    .order('created_at', { ascending: false })

  if (error || !data.length) { alert('No hay pedidos para exportar'); return }

  const fechaLabel = ['Hoy', 'Ayer', 'Hace 2 días'][diaFiltro]
  
  let csv = 'Folio,Cliente,WhatsApp,Recolección,Entrega,Tamaño,Zona,Precio,Estado,Repartidor,Fecha\n'
  
  data.forEach(p => {
    const fecha = new Date(p.created_at).toLocaleString('es-MX')
    csv += `GK-${p.id},"${p.nombre}","${p.whatsapp}","${p.direccion_recoleccion}","${p.direccion_entrega}","${p.tamanio}","${p.zona}","$${p.precio}","${p.estado}","${p.repartidor || 'Sin asignar'}","${fecha}"\n`
  })

  const blob = new Blob(['\ufeff' + csv], { type: 'text/csv;charset=utf-8;' })
  const url = URL.createObjectURL(blob)
  const a = document.createElement('a')
  a.href = url
  a.download = `GUEPACK_${fechaLabel}_${new Date().toLocaleDateString('es-MX').replace(/\//g,'-')}.csv`
  a.click()
  URL.revokeObjectURL(url)
}
function toggleAccordion(id) {
  const content = document.getElementById('accordion-' + id)
  const arrow = document.getElementById('arrow-' + id)
  if (content.style.display === 'none') {
    content.style.display = 'block'
    arrow.textContent = '▲'
    arrow.style.transform = 'rotate(0deg)'
  } else {
    content.style.display = 'none'
    arrow.textContent = '▶'
  }
}

function renderPedido(pedido) {
  return `
    <div class="order-card ${pedido.estado === 'Pendiente' ? 'urgent' : ''}" style="${pedido.estado === 'Entregado' ? 'opacity:0.6' : ''}">
      <div class="order-header">
        <div>
          <div class="order-id">GK-${pedido.id} · ${new Date(pedido.created_at).toLocaleTimeString('es-MX', {hour: '2-digit', minute:'2-digit'})}</div>
          <div class="order-client">${pedido.nombre}</div>
        </div>
        <div class="status-badge ${pedido.estado === 'Pendiente' ? 'badge-pending' : pedido.estado === 'Entregado' ? 'badge-done' : 'badge-transit'}">${pedido.estado}</div>
      </div>
      <div class="order-details">
        <span class="tag tag-orange">${pedido.tamanio}</span>
        <span class="tag tag-blue">${pedido.zona}</span>
        ${pedido.direccion_recoleccion} → ${pedido.direccion_entrega}<br>
        <span style="color:var(--orange);font-weight:700">$${pedido.precio}</span>
      </div>
      <div class="order-actions">
        ${pedido.estado === 'Pendiente' ? '<button class="btn btn-secondary" onclick="asignarRepartidor(' + pedido.id + ')">Asignar repartidor</button>' : ''}
        ${pedido.estado === 'En camino a entrega' ? '<button class="btn" style="background:rgba(240,90,26,0.1);color:var(--orange)" onclick="updateStatus(' + pedido.id + ',\'A punto de llegar\',\'' + pedido.whatsapp + '\',\'' + pedido.nombre + '\')">⏰ A punto de llegar</button>' : ''}
        ${pedido.estado === 'En camino a entrega' || pedido.estado === 'A punto de llegar' ? '<button class="btn" style="background:rgba(34,197,94,0.1);color:var(--success)" onclick="updateStatus(' + pedido.id + ',\'Entregado\',\'' + pedido.whatsapp + '\',\'' + pedido.nombre + '\')">✅ Entregado</button>' : ''}
      </div>
    </div>
  `
}

async function asignarRepartidor(id) {
  const { data, error } = await db.from('repartidores').select('*')
  if (error) { alert('Error al cargar repartidores'); return }

  const opciones = data.map(r => `<option value="${r.nombre}">${r.nombre}</option>`).join('')
  
  const div = document.createElement('div')
  div.id = 'modal-asignar'
  div.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:999;display:flex;align-items:center;justify-content:center;padding:20px'
  div.innerHTML = `
    <div style="background:white;border-radius:20px;padding:24px;width:100%;max-width:340px">
      <div style="font-family:Bebas Neue,sans-serif;font-size:24px;color:#1a4fa0;letter-spacing:2px;margin-bottom:16px">Asignar Repartidor</div>
      <select id="sel-repa" style="width:100%;padding:12px 14px;border:2px solid #e0e6f0;border-radius:10px;font-family:Montserrat,sans-serif;font-size:13px;font-weight:600;color:#1a2740;background:#f4f6fb;margin-bottom:16px">
        <option value="">Selecciona un repartidor...</option>
        ${opciones}
      </select>
      <div style="display:flex;gap:8px">
        <button onclick="this.closest('div[style*=fixed]').remove()" style="flex:1;padding:12px;border:2px solid #e0e6f0;border-radius:10px;background:white;font-family:Montserrat,sans-serif;font-weight:700;font-size:12px;cursor:pointer">Cancelar</button>
        <button onclick="confirmarAsignacion(${id})" style="flex:1;padding:12px;border:none;border-radius:10px;background:#1a4fa0;color:white;font-family:Montserrat,sans-serif;font-weight:900;font-size:12px;cursor:pointer">Asignar ✅</button>
      </div>
    </div>
  `
  document.body.appendChild(div)
}

async function confirmarAsignacion(id) {
  const repa = document.getElementById('sel-repa').value
  if (!repa) { alert('Selecciona un repartidor'); return }

  const { error } = await db.from('pedidos').update({
    estado: 'En camino a recoleccion',
    repartidor: repa
  }).eq('id', id)

  if (error) { alert('Error al asignar'); return }
  
  const modal = document.getElementById('modal-asignar')
  if (modal) modal.remove()
  cargarPedidos()
}

async function updateStatus(id, status, telefono, nombre) {
  const { error } = await db.from('pedidos').update({ estado: status }).eq('id', id)
  if (error) { alert('Error al actualizar'); return }

  const mensajes = {
    'A punto de llegar': 'Hola ' + nombre + '! Tu repartidor esta a punto de llegar. Preparate! - GUEPACK Express',
    'Entregado': 'Hola ' + nombre + '! Tu paquete fue entregado exitosamente. Gracias por confiar en GUEPACK Express!'
  }

  const mensaje = mensajes[status]
  if (mensaje && telefono) {
    await fetch('https://zkrnjdsnuyjaxxnluzmn.supabase.co/functions/v1/notificar-cliente', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + SUPABASE_KEY },
      body: JSON.stringify({ telefono, mensaje })
    })
  }
  cargarPedidos()
}

async function cerrarSesion() {
  await db.auth.signOut()
  window.location.href = 'login.html'
}

init()
</script>
