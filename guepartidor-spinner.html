<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Guepartidor calentando motores</title>
<style>
  body {
    font-family: -apple-system, sans-serif;
    background:#F7F8FA;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    height:100vh;
    margin:0;
    gap:16px;
  }

  /* ===== COMPONENTE: guep-spinner ===== */
  .guep-spinner {
    position: relative;
    width: 96px;
    height: 96px;
  }

  /* Cabeza de gato, rebota suavecito */
  .guep-spinner .cat-head {
    position: absolute;
    top: 6px;
    left: 50%;
    transform: translateX(-50%);
    animation: guep-bounce 1.1s ease-in-out infinite;
    z-index: 3;
  }

  @keyframes guep-bounce {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(-4px); }
  }

  /* Anillo de huellas girando debajo, como "llanta calentando" */
  .guep-spinner .paw-ring {
    position: absolute;
    bottom: 0;
    left: 50%;
    width: 70px;
    height: 70px;
    transform: translateX(-50%);
    animation: guep-spin 1.4s linear infinite;
  }

  @keyframes guep-spin {
    from { transform: translateX(-50%) rotate(0deg); }
    to   { transform: translateX(-50%) rotate(360deg); }
  }

  .guep-spinner .paw-ring .paw {
    position: absolute;
    top: 50%;
    left: 50%;
    transform-origin: 0 0;
  }

  /* 6 huellas distribuidas en círculo, cada una con su propio delay de opacidad */
  .guep-spinner .paw-ring .paw:nth-child(1) { transform: rotate(0deg) translate(0, -32px); }
  .guep-spinner .paw-ring .paw:nth-child(2) { transform: rotate(60deg) translate(0, -32px); }
  .guep-spinner .paw-ring .paw:nth-child(3) { transform: rotate(120deg) translate(0, -32px); }
  .guep-spinner .paw-ring .paw:nth-child(4) { transform: rotate(180deg) translate(0, -32px); }
  .guep-spinner .paw-ring .paw:nth-child(5) { transform: rotate(240deg) translate(0, -32px); }
  .guep-spinner .paw-ring .paw:nth-child(6) { transform: rotate(300deg) translate(0, -32px); }

  .guep-spinner .paw-ring .paw circle { fill: #F05A1A; }
  .guep-spinner .paw-ring .paw:nth-child(1) { opacity: 1; }
  .guep-spinner .paw-ring .paw:nth-child(2) { opacity: 0.85; }
  .guep-spinner .paw-ring .paw:nth-child(3) { opacity: 0.7; }
  .guep-spinner .paw-ring .paw:nth-child(4) { opacity: 0.55; }
  .guep-spinner .paw-ring .paw:nth-child(5) { opacity: 0.4; }
  .guep-spinner .paw-ring .paw:nth-child(6) { opacity: 0.25; }

  /* Nubecitas de "motor calentando" saliendo por abajo */
  .guep-spinner .puff {
    position: absolute;
    bottom: 4px;
    left: 50%;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #cfd6e0;
    opacity: 0;
    animation: guep-puff 1.4s ease-out infinite;
  }
  .guep-spinner .puff:nth-child(1) { animation-delay: 0s; margin-left:-14px; }
  .guep-spinner .puff:nth-child(2) { animation-delay: 0.35s; margin-left:0px; }
  .guep-spinner .puff:nth-child(3) { animation-delay: 0.7s; margin-left:10px; }

  @keyframes guep-puff {
    0%   { opacity: 0; transform: translateY(0) scale(0.6); }
    30%  { opacity: 0.6; }
    100% { opacity: 0; transform: translateY(14px) scale(1.4); }
  }

  .caption {
    font-size: 13px;
    color: #1a4fa0;
    font-weight: 600;
  }
</style>
</head>
<body>

<div class="guep-spinner">
  <!-- cabeza de gato -->
  <svg class="cat-head" width="44" height="40" viewBox="0 0 44 40" fill="none">
    <circle cx="22" cy="20" r="15" stroke="#1E56C7" stroke-width="2.5" fill="#F7F8FA"/>
    <path d="M11 10 L6 1 L16 6" stroke="#1E56C7" stroke-width="2.3" stroke-linejoin="round"/>
    <path d="M33 10 L38 1 L28 6" stroke="#1E56C7" stroke-width="2.3" stroke-linejoin="round"/>
    <circle cx="17" cy="19" r="1.6" fill="#1E56C7"/>
    <circle cx="27" cy="19" r="1.6" fill="#1E56C7"/>
    <path d="M17 25 Q22 29 27 25" stroke="#F05A1A" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  </svg>

  <!-- anillo de huellas girando -->
  <svg class="paw-ring" width="70" height="70" viewBox="-35 -35 70 70">
    <g class="paw"><circle r="3.4"/></g>
    <g class="paw"><circle r="3.4"/></g>
    <g class="paw"><circle r="3.4"/></g>
    <g class="paw"><circle r="3.4"/></g>
    <g class="paw"><circle r="3.4"/></g>
    <g class="paw"><circle r="3.4"/></g>
  </svg>

  <!-- nubecitas de motor -->
  <div class="puff"></div>
  <div class="puff"></div>
  <div class="puff"></div>
</div>

<div class="caption">El Guepartidor está calentando motores...</div>

</body>
</html>
