<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GUEPACK – Redirigiendo...</title>
<link rel="apple-touch-icon" href="/Icono_gp.png">
<meta name="theme-color" content="#1a4fa0">
<link rel="icon" type="image/png" href="/Icono_gp.png">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0e3070;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Montserrat', sans-serif;
  }
  .estado {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 20px;
    color: white;
    font-size: 14px;
    font-weight: 700;
  }
  .loader {
    display: flex;
    gap: 8px;
  }
  .dot {
    width: 10px; height: 10px;
    background: #f05a1a;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; background: white; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
    40% { transform: scale(1); opacity: 1; }
  }
</style>
</head>
<body>
<div class="estado" role="status" aria-live="polite">
  <div class="loader" aria-hidden="true">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
  <div>Iniciando sesión...</div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SUPABASE_URL = 'https://zkrnjdsnuyjaxxnluzmn.supabase.co'
const SUPABASE_KEY = 'sb_publishable_nde3IHFs-CJqqY0w5gV77g_FbtKtH7z'
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: { autoRefreshToken: true, persistSession: true, detectSessionInUrl: true }
})

let redireccionEnCurso = false

async function redirigirPorRol(session) {
  if (!session?.user || redireccionEnCurso) return
  redireccionEnCurso = true

  const { data: usuario, error } = await db.from('usuarios')
    .select('rol')
    .eq('user_id', session.user.id)
    .single()

  if (error) {
    console.warn('[redirect] No fue posible consultar el rol; se abrirá la aplicación:', error.message)
  }
  console.log('[redirect] rol:', usuario?.rol)

  if (usuario?.rol === 'admin') window.location.replace('/admin.html')
  else if (usuario?.rol === 'repartidor') window.location.replace('/repartidor.html')
  else window.location.replace('/app.html')
}

db.auth.onAuthStateChange(async (evento, session) => {
  console.log('[redirect] evento:', evento, 'correo:', session?.user?.email)
  if (evento === 'SIGNED_IN' && session) {
    await redirigirPorRol(session)
  }
})

async function comprobarSesionInicial() {
  const { data: { session }, error } = await db.auth.getSession()
  if (error) {
    console.warn('[redirect] No fue posible comprobar la sesión inicial:', error.message)
  }
  if (session) {
    await redirigirPorRol(session)
    return
  }

  // Da tiempo al cliente de Supabase para procesar el callback de OAuth.
  await new Promise(resolve => setTimeout(resolve, 1500))
  const { data: { session: sesionReintento } } = await db.auth.getSession()
  if (sesionReintento) {
    await redirigirPorRol(sesionReintento)
    return
  }

  window.location.replace('/login.html')
}

comprobarSesionInicial()
</script>
</body>
</html>
