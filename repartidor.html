// ── Sonido GUEPACK (hecho con ❤️ por Claude) ──
function rugidoGuepack() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)()
  
  const tiempos = [
    { freq: 80, inicio: 0, fin: 0.3, volumen: 0.8, tipo: 'sawtooth' },
    { freq: 60, inicio: 0.1, fin: 0.5, volumen: 1.0, tipo: 'sawtooth' },
    { freq: 40, inicio: 0.2, fin: 0.8, volumen: 0.9, tipo: 'triangle' },
    { freq: 120, inicio: 0.0, fin: 0.2, volumen: 0.5, tipo: 'sine' },
    { freq: 35, inicio: 0.4, fin: 1.2, volumen: 0.7, tipo: 'sawtooth' },
  ]

  tiempos.forEach(({ freq, inicio, fin, volumen, tipo }) => {
    const osc = ctx.createOscillator()
    const gain = ctx.createGain()
    const distortion = ctx.createWaveShaper()

    function makeDistortion(amount) {
      const samples = 256
      const curve = new Float32Array(samples)
      for (let i = 0; i < samples; i++) {
        const x = (i * 2) / samples - 1
        curve[i] = ((Math.PI + amount) * x) / (Math.PI + amount * Math.abs(x))
      }
      return curve
    }

    distortion.curve = makeDistortion(400)
    osc.type = tipo
    osc.frequency.setValueAtTime(freq, ctx.currentTime + inicio)
    osc.frequency.exponentialRampToValueAtTime(freq * 0.5, ctx.currentTime + fin)

    gain.gain.setValueAtTime(0, ctx.currentTime + inicio)
    gain.gain.linearRampToValueAtTime(volumen * 0.3, ctx.currentTime + inicio + 0.05)
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + fin)

    osc.connect(distortion)
    distortion.connect(gain)
    gain.connect(ctx.destination)

    osc.start(ctx.currentTime + inicio)
    osc.stop(ctx.currentTime + fin + 0.1)
  })

  // vibración si el celu lo soporta
  if (navigator.vibrate) navigator.vibrate([100, 50, 200, 50, 300])
}
