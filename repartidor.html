// ── Actualizar marcadores en el mapa (diff — no recrear el mapa) ─────────────
function _actualizarMarcadoresMapa(pedidos, paradasPorPedido) {
  if (!_mapboxMap) return
  const idsVistos = new Set()
  const GREEN = '#22c55e'
  const _ESTADOS_POST_REC = ['Recolectado', 'En camino a entrega', 'Repartidor en domicilio', 'Entregado']

  pedidos.forEach(p => {
    const color  = _colorGrupo(p.nombre_mostrar || p.nombre)
    const keyRec = 'rec-' + p.id
    const keyEnt = 'ent-' + p.id
    const estaEntregado = p.estado === 'Entregado'
    const yaRecolectado = _ESTADOS_POST_REC.includes(p.estado)

    // Pin recolección — ocultar cuando pedido entregado
    if (!estaEntregado && p.lat_recoleccion != null && p.lng_recoleccion != null) {
      idsVistos.add(keyRec)
      const pinColor = yaRecolectado ? GREEN : color
      if (_markersMap.has(keyRec)) {
        _markersMap.get(keyRec).setLngLat([p.lng_recoleccion, p.lat_recoleccion])
        _markersMap.get(keyRec).getElement().style.background = pinColor
      } else {
        const m = new mapboxgl.Marker({ element: _mkPinPickup(pinColor), anchor: 'center' })
          .setLngLat([p.lng_recoleccion, p.lat_recoleccion])
          .setPopup(new mapboxgl.Popup({ offset: 14 }).setHTML(
            `<div style="font-family:Montserrat,sans-serif;font-size:11px;font-weight:700"><b>GK-${p.id}</b><br>📦 ${p.direccion_recoleccion || ''}</div>`
          ))
          .addTo(_mapboxMap)
        _markersMap.set(keyRec, m)
      }
    }

    // Pins entrega — multi-stop o simple
    const paradas = paradasPorPedido[p.id]
    const paradasConCoords = paradas?.filter(par => par.lat != null && par.lng != null)
    if (paradasConCoords?.length) {
      const todasCompletadas = paradasConCoords.every(par => par.estado === 'completada')
      // Quitar todos los pines cuando la ruta completa fue entregada
      if (!(todasCompletadas && estaEntregado)) {
        paradasConCoords.forEach(par => {
          const kp = 'par-' + par.id
          idsVistos.add(kp)
          const parColor = par.estado === 'completada' ? GREEN : color
          if (_markersMap.has(kp)) {
            _markersMap.get(kp).setLngLat([par.lng, par.lat])
            _markersMap.get(kp).getElement().style.background = parColor
            const _numP = _markersMap.get(kp).getElement().querySelector('.mapa-pin-num')
            if (_numP) _numP.textContent = par.orden
          } else {
            const m = new mapboxgl.Marker({ element: _mkPinDelivery(parColor, par.orden), anchor: 'bottom' })
              .setLngLat([par.lng, par.lat])
              .setPopup(new mapboxgl.Popup({ offset: 14 }).setHTML(
                `<div style="font-family:Montserrat,sans-serif;font-size:11px;font-weight:700"><b>GK-${p.id} · Parada ${par.orden}</b><br>📍 ${par.direccion || ''}</div>`
              ))
              .addTo(_mapboxMap)
            _markersMap.set(kp, m)
          }
        })
      }
    } else if (!estaEntregado && p.lat_entrega != null && p.lng_entrega != null) {
      idsVistos.add(keyEnt)
      if (_markersMap.has(keyEnt)) {
        _markersMap.get(keyEnt).setLngLat([p.lng_entrega, p.lat_entrega])
      } else {
        const m = new mapboxgl.Marker({ element: _mkPinDelivery(color, 1), anchor: 'bottom' })
          .setLngLat([p.lng_entrega, p.lat_entrega])
          .setPopup(new mapboxgl.Popup({ offset: 14 }).setHTML(
            `<div style="font-family:Montserrat,sans-serif;font-size:11px;font-weight:700"><b>GK-${p.id}</b><br>📍 ${p.direccion_entrega || ''}</div>`
          ))
          .addTo(_mapboxMap)
        _markersMap.set(keyEnt, m)
      }
    }
  })

  // Remover solo los que ya no aplican
  for (const [key, marker] of _markersMap) {
    if (!idsVistos.has(key)) { marker.remove(); _markersMap.delete(key) }
  }

  _renderSheetPedidos(pedidos, paradasPorPedido)
}

// ── Sheet body (estilo mockup: client-group / stop rows / tags) ──────────────
function _renderSheetPedidos(pedidos, paradasPorPedido) {
  const body    = document.getElementById('mapa-sheet-body')
  const countEl = document.getElementById('mapa-sheet-count')
  const legend  = document.getElementById('mapa-legend')
  if (!body) return

  // Totales para el subtítulo
  let totalRec = pedidos.length
  let totalEnt = 0
  pedidos.forEach(p => {
    const pars = paradasPorPedido[p.id]
    totalEnt += pars?.length || (p.lat_entrega != null ? 1 : 0)
  })
  if (countEl) countEl.textContent =
    `${totalRec} recolección${totalRec !== 1 ? 'es' : ''} · ${totalEnt} entrega${totalEnt !== 1 ? 's' : ''} · orden sugerido`

  // Agrupar por nombre_mostrar
  const grupos = {}
  pedidos.forEach(p => {
    const g = p.nombre_mostrar || p.nombre
    if (!grupos[g]) grupos[g] = { pedidos: [], tipo: p.tipo_cliente }
    grupos[g].pedidos.push(p)
  })

  // Actualizar leyenda
  let lgHtml = ''
  for (const [g, info] of Object.entries(grupos)) {
    const c = _colorGrupo(g)
    const t = info.tipo === 'empresa' ? 'empresa' : 'cliente'
    const cnt = info.pedidos.reduce((acc, p) => {
      return acc + ((paradasPorPedido[p.id]?.length) || (p.lat_entrega != null ? 1 : 0))
    }, 0)
    lgHtml += `<div class="lg-row"><span class="lg-sw" style="background:${c}"></span>${g} (${cnt}) · ${t}</div>`
  }
  if (legend) { legend.innerHTML = lgHtml; legend.style.display = lgHtml ? '' : 'none' }

  if (pedidos.length === 0) {
    body.innerHTML = '<div style="font-family:Montserrat,sans-serif;font-size:12px;color:#9aa3b2;padding:8px 0">Sin pedidos activos</div>'
    return
  }

  let html = ''
  for (const [g, info] of Object.entries(grupos)) {
    const color     = _colorGrupo(g)
    const tipoLabel = info.tipo === 'empresa' ? 'Empresa' : 'Cliente'
    let rCnt = info.pedidos.length
    let eCnt = info.pedidos.reduce((acc, p) => {
      return acc + ((paradasPorPedido[p.id]?.length) || (p.lat_entrega != null ? 1 : 0))
    }, 0)

    html += `<div class="ms-group">
      <div class="ms-group-header">
        <span class="ms-swatch" style="background:${color}"></span>
        ${g}
        <span class="ms-kind">· ${tipoLabel}</span>
        <span class="ms-count-right">${rCnt} recolección${rCnt!==1?'es':''} · ${eCnt} entrega${eCnt!==1?'s':''}</span>
      </div>`

    info.pedidos.forEach(p => {
      const pars = paradasPorPedido[p.id]
      // Fila recolección
      html += `<div class="ms-stop">
        <div class="ms-idx sq" style="background:${color}">R</div>
        <div class="ms-addr">${p.direccion_recoleccion || '—'}</div>
        <span class="ms-tag rec">Recolección</span>
      </div>`
      // Filas entrega
      if (pars?.length) {
        pars.forEach(par => {
          html += `<div class="ms-stop">
            <div class="ms-idx" style="background:${color}">${par.orden}</div>
            <div class="ms-addr">${par.direccion || '—'}</div>
            <span class="ms-tag ent">Entrega</span>
          </div>`
        })
      } else {
        html += `<div class="ms-stop">
          <div class="ms-idx" style="background:${color}">1</div>
          <div class="ms-addr">${p.direccion_entrega || '—'}</div>
          <span class="ms-tag ent">Entrega</span>
        </div>`
      }
    })
    html += `</div>`
  }

  html += `<button class="ms-optimize-btn" id="btn-optimizar" onclick="_optimizarOrdenRuta()"><span class="icon-on-color" style="display:inline-flex;width:16px;height:16px;vertical-align:middle;margin-right:4px">${GUEPACK_ICONS.ubicacion}</span>Optimizar orden de ruta</button>`
  html += `<div class="ms-note">El mapa se carga una sola vez por sesión · los pines se actualizan en tiempo real</div>`
  body.innerHTML = html
}

// ── Geocodificación Mapbox — obtiene lat/lng para una dirección de texto ─────
async function _geocodirDireccion(addr) {
  if (!addr || !mapboxgl.accessToken) return null
  const q = encodeURIComponent(addr + ', Guadalajara, Jalisco, México')
  try {
    const r = await fetch(`https://api.mapbox.com/geocoding/v5/mapbox.places/${q}.json?access_token=${mapboxgl.accessToken}&limit=1&country=MX&language=es`)
    const j = await r.json()
    const f = j.features?.[0]
    if (!f) return null
    return { lat: f.center[1], lng: f.center[0] }
  } catch(e) { return null }
}

// ── Cargar pedidos activos del repartidor ────────────────────────────────────
async function _cargarPedidosEnMapa() {
  if (!_repaData?.nombre) return
  const nombreRepa = _repaData.nombre

  // 1) Pedidos sin embed — empresa_codigo no es FK formal a empresas_afiliadas
  const { data: pedidos, error } = await db.from('pedidos')
    .select('id, nombre, direccion_recoleccion, lat_recoleccion, lng_recoleccion, direccion_entrega, lat_entrega, lng_entrega, estado, empresa_codigo')
    .eq('repartidor', nombreRepa)
    .not('estado', 'in', '(Entregado,Cancelado)')
    .order('empresa_codigo', { nullsFirst: false })
    .order('created_at')

  if (error) { console.error('[mapa] pedidos:', error); return }

  // 2) Nombres de empresa — solo los códigos distintos que aparecen en este batch
  const codigosUnicos = [...new Set((pedidos || []).map(p => p.empresa_codigo).filter(Boolean))]
  const empresaMap = {}
  if (codigosUnicos.length) {
    const { data: empresas } = await db.from('empresas_afiliadas')
      .select('codigo, nombre')
      .in('codigo', codigosUnicos)
    if (empresas) empresas.forEach(e => { empresaMap[e.codigo] = e.nombre })
  }

  const pedidosMapeados = (pedidos || []).map(p => ({
    ...p,
    nombre_mostrar: (p.empresa_codigo && empresaMap[p.empresa_codigo]) || p.nombre,
    tipo_cliente:   p.empresa_codigo ? 'empresa' : 'individual'
  }))

  const ids = pedidosMapeados.map(p => p.id)
  const paradasPorPedido = {}
  if (ids.length) {
    const { data: pars } = await db.from('paradas')
      .select('id, pedido_id, orden, direccion, lat, lng, estado')
      .in('pedido_id', ids)
      .order('orden')
    if (pars) {
      pars.forEach(par => {
        if (!paradasPorPedido[par.pedido_id]) paradasPorPedido[par.pedido_id] = []
        paradasPorPedido[par.pedido_id].push(par)
      })
    }
  }

  // Geocodificar coords faltantes (pedidos sin lat_recoleccion y paradas sin lat/lng)
  // Se actualiza la BD para que la próxima carga ya tenga las coords cacheadas
  if (mapboxgl.accessToken) {
    const _geoTasks = []
    pedidosMapeados.forEach(p => {
      if (p.lat_recoleccion == null && p.direccion_recoleccion) {
        _geoTasks.push(_geocodirDireccion(p.direccion_recoleccion).then(c => {
          if (!c) return
          p.lat_recoleccion = c.lat; p.lng_recoleccion = c.lng
          db.from('pedidos').update({ lat_recoleccion: c.lat, lng_recoleccion: c.lng }).eq('id', p.id).then(() => {})
        }))
      }
    })
    Object.values(paradasPorPedido).forEach(pars => {
      pars.forEach(par => {
        if (par.lat == null && par.direccion) {
          _geoTasks.push(_geocodirDireccion(par.direccion).then(c => {
            if (!c) return
            par.lat = c.lat; par.lng = c.lng
            db.from('paradas').update({ lat: c.lat, lng: c.lng }).eq('id', par.id).then(() => {})
          }))
        }
      })
    })
    if (_geoTasks.length) await Promise.all(_geoTasks)
  }

  _mapaLastPedidos = pedidosMapeados
  _mapaLastParadas = paradasPorPedido
  _mapaOptimizado  = false
  _actualizarMarcadoresMapa(pedidosMapeados, paradasPorPedido)
  _suscribirMapaRealtime(nombreRepa)
}

// ── Realtime — suscripción única ─────────────────────────────────────────────
function _suscribirMapaRealtime(nombreRepa) {
  if (_mapaRealtimeCh) return
  _mapaRealtimeCh = db.channel('mapa-pedidos-' + nombreRepa)
    .on('postgres_changes', {
      event: '*', schema: 'public', table: 'pedidos',
      filter: 'repartidor=eq.' + nombreRepa
    }, () => { _cargarPedidosEnMapa() })
    .subscribe()
}

// ── Próxima parada sugerida (GPS client-side, sin llamadas extra a API) ────────

// Devuelve el siguiente stop pendiente, priorizando recolecciones no completadas
function _proximaParada() {
  const _ESTADOS_POST_REC = ['Recolectado', 'En camino a entrega', 'Repartidor en domicilio', 'Entregado']
  const recs = [], ents = []
  Object.values(_pedidosRep).forEach(p => {
    // Recolección del pedido — excluir si ya fue recolectada (foto o estado posterior)
    const yaRecolectado = _ESTADOS_POST_REC.includes(p.estado)
    if (!yaRecolectado && p.lat_recoleccion != null && p.lng_recoleccion != null) {
      recs.push({ tipo: 'rec', pedidoId: p.id, clienteNombre: p.nombre,
        direccion: p.direccion_recoleccion, lat: p.lat_recoleccion, lng: p.lng_recoleccion })
    }
    const pars = _todasParadas[p.id] || []
    if (pars.length) {
      pars.forEach(par => {
        if (par.estado === 'completada') return  // excluir completadas
        if (par.lat == null || par.lng == null) return
        ents.push({ tipo: 'ent', pedidoId: p.id, clienteNombre: p.nombre,
          direccion: par.direccion, lat: par.lat, lng: par.lng, orden: par.orden })
      })
    } else if (!yaRecolectado && p.lat_entrega != null && p.lng_entrega != null) {
      ents.push({ tipo: 'ent', pedidoId: p.id, clienteNombre: p.nombre,
        direccion: p.direccion_entrega, lat: p.lat_entrega, lng: p.lng_entrega })
    }
  })
  const candidates = recs.length ? recs : ents
  if (!candidates.length) return null
  if (!_currentGPS) return candidates[0]
  let best = null, bestDist = Infinity
  candidates.forEach(s => {
    const d = _haversine(_currentGPS.lat, _currentGPS.lng, s.lat, s.lng)
    if (d < bestDist) { bestDist = d; best = { ...s, distKm: d } }
  })
  return best
}

function _renderProximaParada() {
  const el = document.getElementById('tarjeta-proxima-parada')
  if (!el) return
  const parada = _proximaParada()
  if (!parada) { el.style.display = 'none'; return }
  el.style.display = ''
  const esRec = parada.tipo === 'rec'
  let distStr = ''
  if (parada.distKm != null) {
    distStr = parada.distKm < 1
      ? Math.round(parada.distKm * 1000) + ' m aprox.'
      : parada.distKm.toFixed(1) + ' km aprox.'
  }
  el.innerHTML = `
    <div class="tpp-label">Próxima parada sugerida</div>
    <div class="tpp-body">
      <span class="tpp-tag ${esRec ? 'rec' : 'ent'}">${esRec ? 'Recolección' : 'Entrega'}</span>
      <div>
        <div class="tpp-addr">${parada.direccion || '—'}</div>
        <div class="tpp-cliente">GK-${parada.pedidoId} · ${parada.clienteNombre || '—'}</div>
        ${distStr ? `<div class="tpp-dist">${distStr}</div>` : ''}
      </div>
    </div>`
}

// ── Optimización de ruta — vecino más cercano (Haversine, 100% client-side) ──

function _haversine(lat1, lng1, lat2, lng2) {
  const R = 6371
  const dLat = (lat2 - lat1) * Math.PI / 180
  const dLng = (lng2 - lng1) * Math.PI / 180
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))
}

function _buildStops() {
  const stops = []
  _mapaLastPedidos.forEach(p => {
    const color = _colorGrupo(p.nombre_mostrar || p.nombre)
    if (p.lat_recoleccion != null && p.lng_recoleccion != null) {
      stops.push({ key: 'rec-' + p.id, type: 'rec', pedidoId: p.id,
        lat: p.lat_recoleccion, lng: p.lng_recoleccion,
        addr: p.direccion_recoleccion || '—', color })
    }
    const pars = _mapaLastParadas[p.id]
    if (pars?.length) {
      pars.forEach(par => {
        if (par.lat != null && par.lng != null) {
          stops.push({ key: 'par-' + par.id, type: 'par', pedidoId: p.id,
            lat: par.lat, lng: par.lng,
            addr: par.direccion || '—', color })
        }
      })
    } else if (p.lat_entrega != null && p.lng_entrega != null) {
      stops.push({ key: 'ent-' + p.id, type: 'par', pedidoId: p.id,
        lat: p.lat_entrega, lng: p.lng_entrega,
        addr: p.direccion_entrega || '—', color })
    }
  })
  return stops
}

function _nearestNeighbor(startLat, startLng, stops) {
  // Qué pedidos tienen pin de recolección (para aplicar la restricción)
  const recPedidos = new Set(stops.filter(s => s.type === 'rec').map(s => s.pedidoId))
  const unvisited = [...stops]
  const ordered = []
  const visitedKeys = new Set()
  let curLat = startLat, curLng = startLng

  while (unvisited.length > 0) {
    let bestIdx = -1, bestDist = Infinity

    for (let i = 0; i < unvisited.length; i++) {
      const s = unvisited[i]
      // Entrega bloqueada si su recolección aún no fue visitada
      if (s.type === 'par' && recPedidos.has(s.pedidoId) && !visitedKeys.has('rec-' + s.pedidoId)) continue
      const d = _haversine(curLat, curLng, s.lat, s.lng)
      if (d < bestDist) { bestDist = d; bestIdx = i }
    }

    // Seguridad: todos bloqueados → elegir la recolección más cercana para desbloquear
    if (bestIdx === -1) {
      for (let i = 0; i < unvisited.length; i++) {
        if (unvisited[i].type !== 'rec') continue
        const d = _haversine(curLat, curLng, unvisited[i].lat, unvisited[i].lng)
        if (d < bestDist) { bestDist = d; bestIdx = i }
      }
      if (bestIdx === -1) break
    }

    const chosen = unvisited.splice(bestIdx, 1)[0]
    visitedKeys.add(chosen.key)
    ordered.push(chosen)
    curLat = chosen.lat; curLng = chosen.lng
  }
  return ordered
}

function _optimizarOrdenRuta() {
  const btn = document.getElementById('btn-optimizar')
  if (btn) { btn.textContent = '⏳ Calculando...'; btn.disabled = true }

  setTimeout(() => {
    const stops = _buildStops()
    if (!stops.length) {
      _toastRepa('ℹ️ Sin coordenadas para optimizar — agrega lat/lng a los pedidos', '#8fa3c0')
      if (btn) { btn.textContent = 'Optimizar orden de ruta'; btn.disabled = false }
      return
    }

    // Posición del repartidor o fallback GDL centro
    let startLat = 20.659, startLng = -103.346
    try {
      const pos = _markerDriver?.getLngLat()
      if (pos?.lat && pos?.lng) { startLat = pos.lat; startLng = pos.lng }
    } catch(e) {}

    const ordered = _nearestNeighbor(startLat, startLng, stops)
    _mapaOptimizado = true

    // Renumerar pines en el mapa
    ordered.forEach((stop, idx) => {
      const marker = _markersMap.get(stop.key)
      if (!marker) return
      const numEl = marker.getElement().querySelector('.mapa-pin-num')
      if (numEl) numEl.textContent = idx + 1
    })

    _renderSheetOptimizado(ordered)
  }, 60)
}

function _renderSheetOptimizado(ordered) {
  const body    = document.getElementById('mapa-sheet-body')
  const countEl = document.getElementById('mapa-sheet-count')
  if (!body) return
  if (countEl) countEl.textContent = `${ordered.length} paradas · ruta optimizada por distancia`

  let html = ordered.map((stop, idx) => {
    const esRec = stop.type === 'rec'
    return `<div class="ms-stop">
      <div class="ms-idx${esRec ? ' sq' : ''}" style="background:${stop.color}">${idx + 1}</div>
      <div class="ms-addr">${stop.addr}</div>
      <span class="ms-tag ${esRec ? 'rec' : 'ent'}">${esRec ? 'Recolección' : 'Entrega'}</span>
    </div>`
  }).join('')

  html += `<button class="ms-optimize-btn" id="btn-optimizar" onclick="_optimizarOrdenRuta()"><span class="icon-on-color" style="display:inline-flex;width:16px;height:16px;vertical-align:middle;margin-right:4px">${GUEPACK_ICONS.ubicacion}</span>Optimizar de nuevo</button>`
  html += `<div class="ms-note">Orden por vecino más cercano · recarga la página para restablecer</div>`
  body.innerHTML = html
}
</script>
