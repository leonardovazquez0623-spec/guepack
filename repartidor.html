<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GUEPACK – Repartidor</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/Icono_gp.png">
<meta name="theme-color" content="#1a4fa0">
<link rel="icon" type="image/png" href="/Icono_gp.png">
<style>
  :root {
    --blue: #1a4fa0;
    --blue-dark: #0e3070;
    --blue-light: #2563c4;
    --orange: #f05a1a;
    --white: #ffffff;
    --gray-light: #f4f6fb;
    --gray: #e0e6f0;
    --gray-mid: #8fa3c0;
    --text: #1a2740;
    --success: #22c55e;
    --shadow: 0 4px 24px rgba(26,79,160,0.13);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Montserrat', sans-serif; background: var(--gray-light); color: var(--text); min-height: 100vh; }
  .delivery-header {
    background: linear-gradient(135deg, #0e3070, #1a4fa0);
    padding: 24px 20px 20px;
    color: white;
  }
  .delivery-name { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 2px; }
  .delivery-sub { font-size: 11px; color: rgba(255,255,255,0.6); font-weight: 600; letter-spacing: 1px; margin-top: 2px; }
  .btn-logout {
    background: rgba(255,255,255,0.15);
    border: none;
    color: white;
    font-family: 'Montserrat', sans-serif;
    font-weight: 700;
    font-size: 11px;
    padding: 6px 12px;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 8px;
    letter-spacing: 1px;
    transition: background .2s;
  }
  .btn-logout:hover { background: var(--orange); }
  .container { padding: 16px; max-width: 480px; margin: 0 auto; }
  .card-title {
    font-size: 11px;
    font-weight: 900;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--blue);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title::after {
    content: '';
    flex: 1;
    height: 2px;
    background: linear-gradient(90deg, var(--orange), transparent);
    border-radius: 2px;
  }
  .route-card {
    background: white;
    border-radius: 14px;
    margin-bottom: 12px;
    overflow: hidden;
    box-shadow: var(--shadow);
  }
  .route-top {
    background: linear-gradient(90deg, var(--blue), var(--blue-light));
    padding: 12px 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .route-number { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: white; letter-spacing: 1px; }
  .route-type { font-size: 10px; color: rgba(255,255,255,0.7); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
  .route-body { padding: 14px 16px; }
  .route-addr { font-size: 13px; font-weight: 700; margin-bottom: 4px; }
  .route-client { font-size: 11px; color: var(--gray-mid); font-weight: 600; margin-bottom: 12px; }
  .status-steps { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
  .step-btn {
    padding: 7px 11px;
    border-radius: 8px;
    font-size: 10px;
    font-weight: 900;
    letter-spacing: 0.5px;
    border: 2px solid;
    cursor: pointer;
    transition: all .2s;
    font-family: 'Montserrat', sans-serif;
    flex: 1;
    text-align: center;
  }
  .step-btn.inactive { border-color: var(--gray); color: var(--gray-mid); background: var(--gray-light); }
  .step-btn.active { border-color: var(--orange); color: white; background: var(--orange); }
  .step-btn.done { border-color: var(--success); color: white; background: var(--success); }
  .empty-state { text-align: center; padding: 40px 20px; color: var(--gray-mid); }
  .empty-icon { font-size: 48px; display: block; margin-bottom: 12px; }
  .empty-text { font-size: 13px; font-weight: 700; }
  .btn { width: 100%; padding: 10px; border: none; border-radius: 8px; font-family: 'Montserrat', sans-serif; font-size: 11px; font-weight: 900; cursor: pointer; }
  .btn-outline { background: transparent; border: 2px solid var(--blue); color: var(--blue); }
</style>
</head>
<body>

<div class="delivery-header">
  <div style="display:flex;justify-content:space-between;align-items:flex-start">
    <div>
      <div class="delivery-name" id="delivery-nombre">Hola 👋</div>
      <div class="delivery-sub">REPARTIDOR · GUEPACK EXPRESS</div>
    </div>
    <button onclick="cerrarSesion()" class="btn-logout">🚪 Salir</button>
  </div>
</div>

<div class="container" style="padding-top:16px">
  <div class="card-title">🏍️ Mis entregas de hoy</div>
  <div id="lista-repartidor">
    <div class="empty-state">
      <span class="empty-icon">🏍️</span>
      <div class="empty-text">Cargando entregas...</div>
    </div>
  </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SUPABASE_URL = 'https://zkrnjdsnuyjaxxnluzmn.supabase.co'
const SUPABASE_KEY = 'sb_publishable_OjSM3JPqRsP87pru1Q1Yzw_9vGG7EFb'
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY)

async function init() {
  const { data: { session } } = await db.auth.getSession()
  if (!session) { window.location.href = 'login.html'; return; }

  const { data } = await db.from('usuarios').select('rol').eq('email', session.user.email).single()
  if (!data || data.rol !== 'repartidor') { window.location.href = 'login.html'; return; }

  const nombre = session.user.user_metadata?.nombre || session.user.email
  document.getElementById('delivery-nombre').textContent = 'Hola, ' + nombre + ' 👋'

  cargarPedidos(session.user.email)
}

async function cargarPedidos(email) {
  const { data: usuario } = await db.from('usuarios').select('nombre').eq('email', email).single()
  const nombreRepa = usuario?.nombre || email

  const { data, error } = await db.from('pedidos')
    .select('*')
    .eq('repartidor', nombreRepa)
    .neq('estado', 'Entregado')
    .order('created_at', { ascending: false })

  if (error) { console.error(error); return; }

  const contenedor = document.getElementById('lista-repartidor')
  contenedor.innerHTML = ''

  if (data.length === 0) {
    contenedor.innerHTML = '<div class="empty-state"><span class="empty-icon">🏍️</span><div class="empty-text">No tienes pedidos asignados</div></div>'
    return
  }

  data.forEach(pedido => {
    contenedor.innerHTML += `
      <div class="route-card">
        <div class="route-top">
          <div>
            <div class="route-number">GK-${pedido.id}</div>
            <div class="route-type">${pedido.tamanio} · ${pedido.zona}</div>
          </div>
        </div>
        <div class="route-body">
          <div class="route-addr">${pedido.direccion_recoleccion} → ${pedido.direccion_entrega}</div>
          <div class="route-client">Cliente: ${pedido.nombre} · ${pedido.whatsapp}</div>
          <div class="status-steps">
            <div class="step-btn ${pedido.estado === 'En camino a recoleccion' ? 'active' : 'done'}" onclick="cambiarEstado(${pedido.id}, 'En camino a entrega', '${pedido.whatsapp}', '${pedido.nombre}')">✅ Recolectado</div>
            <div class="step-btn ${pedido.estado === 'En camino a entrega' ? 'active' : pedido.estado === 'En camino a recoleccion' ? 'inactive' : 'done'}" onclick="cambiarEstado(${pedido.id}, 'A punto de llegar', '${pedido.whatsapp}', '${pedido.nombre}')">🚚 En camino</div>
            <div class="step-btn ${pedido.estado === 'A punto de llegar' ? 'active' : 'inactive'}" onclick="cambiarEstado(${pedido.id}, 'Entregado', '${pedido.whatsapp}', '${pedido.nombre}')">⏰ Llegando</div>
          </div>
        </div>
      </div>
    `
  })
}

async function cambiarEstado(id, status, telefono, nombre) {
  const { error } = await db.from('pedidos').update({ estado: status }).eq('id', id)
  if (error) { alert('Error al actualizar'); return; }

  const mensajes = {
    'En camino a entrega': 'Hola ' + nombre + '! Tu paquete ya fue recolectado y va en camino. - GUEPACK Express',
    'A punto de llegar': 'Hola ' + nombre + '! Tu repartidor esta a punto de llegar. Preparate! - GUEPACK Express',
    'Entregado': 'Hola ' + nombre + '! Tu paquete fue entregado exitosamente. Gracias por confiar en GUEPACK Express!'
  }

  const mensaje = mensajes[status]
  if (mensaje && telefono) {
    await fetch('https://zkrnjdsnuyjaxxnluzmn.supabase.co/functions/v1/notificar-cliente', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + SUPABASE_KEY
      },
      body: JSON.stringify({ telefono: telefono, mensaje: mensaje })
    })
  }

  const { data: { session } } = await db.auth.getSession()
  cargarPedidos(session.user.email)
}

async function cerrarSesion() {
  await db.auth.signOut()
  window.location.href = 'login.html'
}

init()
</script>
</body>
</html>
