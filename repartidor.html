const audioCtx = new (window.AudioContext || window.webkitAudioContext)()

function tocarNota(freq, inicio, dur) {
  const osc = audioCtx.createOscillator()
  const gain = audioCtx.createGain()
  osc.type = 'sine'
  osc.frequency.value = freq
  gain.gain.setValueAtTime(0.5, audioCtx.currentTime + inicio)
  gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + inicio + dur)
  osc.connect(gain)
  gain.connect(audioCtx.destination)
  osc.start(audioCtx.currentTime + inicio)
  osc.stop(audioCtx.currentTime + inicio + dur + 0.05)
}

function tocarRugido(inicio) {
  [80, 60, 40, 35].forEach((freq, i) => {
    const osc = audioCtx.createOscillator()
    const gain = audioCtx.createGain()
    osc.type = 'sawtooth'
    osc.frequency.setValueAtTime(freq, audioCtx.currentTime + inicio + i * 0.1)
    osc.frequency.exponentialRampToValueAtTime(freq * 0.4, audioCtx.currentTime + inicio + 1.5)
    gain.gain.setValueAtTime(0.25, audioCtx.currentTime + inicio)
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + inicio + 1.5)
    osc.connect(gain)
    gain.connect(audioCtx.destination)
    osc.start(audioCtx.currentTime + inicio)
    osc.stop(audioCtx.currentTime + inicio + 1.6)
  })
}

function rugidoGuepack() {
  audioCtx.resume().then(() => {
    tocarNota(523, 0.0, 0.4)
    tocarNota(659, 0.5, 0.4)
    tocarNota(784, 1.0, 0.6)
    tocarRugido(0.6)
    if (navigator.vibrate) navigator.vibrate([50, 30, 100, 30, 300])
  })
}

console.log('🐆 RUGIDO!')
}

              💬 Chat

const _timerParadaIntervals = {}

function _renderBotonesNormales(pedido) {

function _renderParadasRepartidor(pedidoId, paradas, pedido) {

    console.log(`[_renderParadasRepartidor] → _renderParadasMulti (${paradas.length} paradas)`)
    _renderParadasMulti(pedidoId, paradas, pedido, el)
    return
  }

  // ── Flujo normal (1 destino) — inyectar los 4 botones normales ──
  console.log(`[_renderParadasRepartidor] → _renderBotonesNormales (${paradas.length} parada)`)
  if (pedido) _renderBotonesNormales(pedido)
  el.style.display = 'block'
  const total = paradas.length
  const completadas = paradas.filter(p => p.estado === 'completada').length

  el.innerHTML = `
    <div style="background:#f0f4ff;border-radius:10px;padding:10px 12px;border:1.5px solid rgba(26,79,160,0.15)">
      <div style="font-family:Montserrat,sans-serif;font-weight:900;font-size:11px;color:var(--blue);margin-bottom:8px;letter-spacing:.5px">
        📍 PARADAS — ${completadas}/${total} completadas
      </div>
      ${paradas.map((p, idx) => {
        const anteriorCompletada = idx === 0 || paradas[idx - 1].estado === 'completada'
        const icon = p.estado === 'completada' ? '✅' : p.estado === 'en_domicilio' ? '📍' : p.estado === 'en_camino' ? '🚚' : '⏳'
        const color = p.estado === 'completada' ? '#16a34a' : p.estado === 'en_domicilio' ? '#f05a1a' : p.estado === 'en_camino' ? 'var(--orange)' : '#8fa3c0'

        let btnHtml = ''
        if (p.estado === 'completada') {
          btnHtml = p.foto_url
            ? `<a href="${p.foto_url}" target="_blank" style="font-family:Montserrat,sans-serif;font-weight:700;font-size:10px;color:var(--blue);text-decoration:none">📸 evidencia</a>`
            : '<span style="font-family:Montserrat,sans-serif;font-size:10px;color:#16a34a;font-weight:700">✅ listo</span>'
        } else if (!anteriorCompletada) {
          btnHtml = '<span style="font-family:Montserrat,sans-serif;font-size:10px;color:#c0c0c0;font-weight:700">🔒</span>'
        } else if (p.estado === 'pendiente') {
          btnHtml = `<button onclick="paradaEnCamino(${pedidoId}, ${p.id})" style="font-family:Montserrat,sans-serif;font-weight:900;font-size:10px;padding:5px 10px;border:none;border-radius:6px;background:var(--orange);color:white;cursor:pointer">🚚 En camino</button>`
        } else if (p.estado === 'en_camino') {
          btnHtml = `<button onclick="paradaEnDomicilio(${pedidoId}, ${p.id})" style="font-family:Montserrat,sans-serif;font-weight:900;font-size:10px;padding:5px 10px;border:none;border-radius:6px;background:#f05a1a;color:white;cursor:pointer">📍 Ya llegué</button>`
        } else if (p.estado === 'en_domicilio') {

            <button onclick="abrirModalParada(${pedidoId}, ${p.id}, ${p.orden}, ${total})" style="font-family:Montserrat,sans-serif;font-weight:900;font-size:10px;padding:5px 10px;border:none;border-radius:6px;background:#1a4fa0;color:white;cursor:pointer">📸 Completar</button>

            <div style="display:flex;align-items:center;gap:4px">

        </div>`
      }).join('')}

  const _btnMaps = document.getElementById('maps-btn-completa-' + pedidoId)
  if (_btnMaps && pedido) {

  const todasCompletadas = completadas === total
  const enRuta = ['En camino a entrega', 'A punto de llegar', 'Repartidor en domicilio'].includes(pedido?.estado)

  const stepsEl = document.getElementById('status-steps-' + pedidoId)
  if (!stepsEl) {
    console.warn('[_renderParadasMulti] #status-steps-' + pedidoId + ' no encontrado')
    return

function _iniciarTimerParada(paradaId) {
  const key = 'guepack_timer_p_' + paradaId
  if (!localStorage.getItem(key)) localStorage.setItem(key, Date.now().toString())

  if (_timerParadaIntervals[paradaId]) clearInterval(_timerParadaIntervals[paradaId])

  _timerParadaIntervals[paradaId] = setInterval(() => {
    const el = document.getElementById('timer-parada-' + paradaId)
    if (!el) { clearInterval(_timerParadaIntervals[paradaId]); return }
    const inicio = parseInt(localStorage.getItem(key) || Date.now())
    const segsTranscurridos = Math.floor((Date.now() - inicio) / 1000)
    const restantes = Math.max(0, 7 * 60 - segsTranscurridos)
    const mins = Math.floor(restantes / 60)
    const segs = restantes % 60
    el.textContent = `⏱ ${mins}:${segs.toString().padStart(2, '0')}`
    if (restantes === 0) {
      el.textContent = '⏱ ¡Tiempo!'
      el.style.color = '#ef4444'
      clearInterval(_timerParadaIntervals[paradaId])
    }
  }, 1000)
}

      <div style="font-family:Montserrat,sans-serif;font-weight:900;font-size:16px;margin-bottom:20px;color:#1a4fa0">📦 Confirmar entrega ${_folioLabel}</div>

        <input type="file" id="entrega-foto" accept="image/*" capture="environment" style="display:none">
        <label for="entrega-foto" id="btn-tomar-foto" style="display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:14px;background:#1a4fa0;color:white;border-radius:14px;font-family:Montserrat,sans-serif;font-weight:900;font-size:14px;cursor:pointer;box-sizing:border-box;transition:opacity .2s">📸 Tomar foto</label>
        <div id="entrega-foto-preview" style="margin-top:10px"></div>
      </div>

      <div style="margin-bottom:20px">
        <div style="font-family:Montserrat,sans-serif;font-weight:700;font-size:12px;color:#666;margin-bottom:8px">✍️ Firma del cliente</div>
        <canvas id="entrega-canvas" width="340" height="160" style="border:2px solid #e0e0e0;border-radius:12px;width:100%;touch-action:none;background:#fafafa"></canvas>
        <button onclick="limpiarFirma()" style="margin-top:6px;font-family:Montserrat,sans-serif;font-size:11px;font-weight:700;background:none;border:1px solid #ccc;border-radius:8px;padding:4px 12px;cursor:pointer;color:#666">Limpiar firma</button>

      </div>
    </div>
  `
  document.body.appendChild(modal)

  // Firma digital
  const canvas = document.getElementById('entrega-canvas')
  const ctx = canvas.getContext('2d')
  let dibujando = false

  function getPos(e) {
    const r = canvas.getBoundingClientRect()
    const src = e.touches ? e.touches[0] : e
    return { x: (src.clientX - r.left) * (canvas.width / r.width), y: (src.clientY - r.top) * (canvas.height / r.height) }
  }
  canvas.addEventListener('mousedown', e => { dibujando = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y) })
  canvas.addEventListener('mousemove', e => { if (!dibujando) return; const p = getPos(e); ctx.lineTo(p.x, p.y); ctx.strokeStyle = '#1a4fa0'; ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.stroke() })
  canvas.addEventListener('mouseup', () => dibujando = false)
  canvas.addEventListener('touchstart', e => { e.preventDefault(); dibujando = true; const p = getPos(e); ctx.beginPath(); ctx.moveTo(p.x, p.y) }, { passive: false })

  canvas.addEventListener('touchend', () => dibujando = false)

  // Preview foto
  document.getElementById('entrega-foto').addEventListener('change', function() {
    const file = this.files[0]
    if (!file) return

    btn.textContent = '✅ Foto tomada — cambiar'
    btn.style.background = '#22c55e'
  })
}

async function confirmarEntrega(id) {
  const { whatsapp: telefono, nombre } = _pedidosRep[id] || {}
  const btn = document.getElementById('btn-confirmar-entrega')
  btn.textContent = 'Subiendo...'
  btn.disabled = true

  const BASE_URL = 'https://zkrnjdsnuyjaxxnluzmn.supabase.co/storage/v1/object/public/evidencias'
  let fotoUrl = null
  let firmaUrl = null

  // ── 1. Subir foto ──
  const fotoInput = document.getElementById('entrega-foto')
  if (fotoInput.files[0]) {
    const foto = fotoInput.files[0]
    const rutaFoto = `GK-${id}/foto.jpg`
    console.log('[foto] Iniciando subida:', rutaFoto, 'tamaño:', foto.size, 'tipo:', foto.type)
    const { data: fotoData, error: fotoError } = await db.storage
      .from('evidencias')
      .upload(rutaFoto, foto, { contentType: 'image/jpeg', upsert: true })
    if (fotoError) {
      console.error('[foto] Error al subir:', fotoError)
    } else {
      fotoUrl = `${BASE_URL}/GK-${id}/foto.jpg`
      console.log('[foto] Subida OK:', fotoData, '→', fotoUrl)
    }
  } else {
    console.warn('[foto] No se seleccionó ninguna foto')
  }

  // ── 2. Convertir canvas a blob y subir firma ──
  const canvas = document.getElementById('entrega-canvas')
  console.log('[firma] Convirtiendo canvas a blob...')
  await new Promise(resolve => canvas.toBlob(async blob => {
    if (!blob) {
      console.warn('[firma] toBlob devolvió null, canvas vacío')
      return resolve()
    }
    console.log('[firma] Blob generado, tamaño:', blob.size)
    const rutaFirma = `GK-${id}/firma.png`
    const { data: firmaData, error: firmaError } = await db.storage
      .from('evidencias')
      .upload(rutaFirma, blob, { contentType: 'image/png', upsert: true })
    if (firmaError) {
      console.error('[firma] Error al subir:', firmaError)
    } else {
      firmaUrl = `${BASE_URL}/GK-${id}/firma.png`
      console.log('[firma] Subida OK:', firmaData, '→', firmaUrl)
    }
    resolve()
  }, 'image/png'))

  // ── 3. Actualizar pedido con URLs públicas ──
  const update = {}
  if (fotoUrl) update.foto_evidencia = fotoUrl
  if (firmaUrl) update.firma_evidencia = firmaUrl
  console.log('[pedido] Actualizando campos de evidencia:', update)
  if (Object.keys(update).length) {
    const { data: updateData, error: updateError } = await db.from('pedidos').update(update).eq('id', id)
    if (updateError) console.error('[pedido] Error al guardar URLs:', updateError)
    else console.log('[pedido] URLs guardadas OK:', updateData)
  } else {
    console.warn('[pedido] No hay URLs que guardar, se omite el update')
  }

  document.getElementById('modal-entrega').remove()
  await cambiarEstado(id, 'Entregado', telefono, nombre)
}

  const fotoInput = document.getElementById('parada-foto')
  if (fotoInput.files[0]) {
    const ruta = `GK-${pedidoId}/parada-${orden}.jpg`
    const { error } = await db.storage.from('evidencias').upload(ruta, fotoInput.files[0], { contentType: 'image/jpeg', upsert: true })
    if (!error) fotoUrl = `${BASE_URL}/GK-${pedidoId}/parada-${orden}.jpg`
  }

  const canvas = document.getElementById('parada-canvas')
  await new Promise(resolve => canvas.toBlob(async blob => {
    if (blob) {
      const ruta = `GK-${pedidoId}/firma-parada-${orden}.png`
      const { error } = await db.storage.from('evidencias').upload(ruta, blob, { contentType: 'image/png', upsert: true })
      if (!error) firmaUrl = `${BASE_URL}/GK-${pedidoId}/firma-parada-${orden}.png`
    }
    resolve()
  }, 'image/png'))

  console.log('[confirmarParada] Actualizando parada', paradaId, '→ completada | foto:', fotoUrl, 'firma:', firmaUrl)
  const { error: paradaError } = await db.from('paradas').update({
    estado: 'completada',
    foto_url: fotoUrl,
    firma_url: firmaUrl,
    completada_at: new Date().toISOString()
  }).eq('id', paradaId)
  if (paradaError) {
    console.error('[confirmarParada] Error al actualizar parada:', paradaError)
    alert('Error al guardar la parada. Intenta de nuevo.')
    btn.textContent = '✅ Confirmar parada'; btn.disabled = false
    return
  }
  console.log('[confirmarParada] Parada marcada como completada OK')

  localStorage.removeItem('guepack_timer_p_' + paradaId)
  if (_timerParadaIntervals[paradaId]) { clearInterval(_timerParadaIntervals[paradaId]); delete _timerParadaIntervals[paradaId] }
  document.getElementById('modal-parada').remove()

  const { data: { session } } = await db.auth.getSession()
  console.log('[confirmarParada] Session email:', session?.user?.email)
  if (!session) { window.location.href = 'login.html'; return }
  cargarPedidos(session.user.email)
}

async function cerrarSesion() {
  await db.auth.signOut()
  window.location.href = 'login.html'
}

// ── Chat ──
let _chatChannel = null, _chatPedidoId = null, _chatRol = 'repartidor'
const _unread = {}

async function _cargarBadgesNoLeidos(pedidoIds) {
  if (!pedidoIds || !pedidoIds.length) return
  const { data } = await db.from('mensajes')
    .select('pedido_id')
    .in('pedido_id', pedidoIds)
    .eq('leido', false)
    .neq('de', 'repartidor')
  if (!data) return
  const conteo = {}
  data.forEach(m => { conteo[m.pedido_id] = (conteo[m.pedido_id] || 0) + 1 })
  Object.entries(conteo).forEach(([pid, count]) => {
    const numPid = Number(pid)
    _unread[numPid] = count
    const badge = document.getElementById('chat-badge-' + pid)
    if (badge) { badge.textContent = count; badge.style.display = 'flex' }
  })
}

async function abrirChat(pedidoId, rol, titulo) {
  _chatPedidoId = pedidoId; _chatRol = rol
  // Reset badge
  _unread[pedidoId] = 0
  const badge = document.getElementById('chat-badge-' + pedidoId)
  if (badge) badge.style.display = 'none'

  if (document.getElementById('modal-chat')) cerrarChat()
  const modal = document.createElement('div')
  modal.id = 'modal-chat'
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:10000;display:flex;align-items:flex-end;justify-content:center'
  modal.innerHTML = `
    <div style="background:white;border-radius:24px 24px 0 0;width:100%;max-width:480px;height:76vh;display:flex;flex-direction:column">
      <div style="padding:16px 20px;border-bottom:1px solid #e8e8e8;display:flex;justify-content:space-between;align-items:center;flex-shrink:0">
        <span style="font-family:Montserrat,sans-serif;font-weight:900;font-size:15px;color:#1a4fa0">💬 ${titulo}</span>
        <button onclick="cerrarChat()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#8fa3c0">✕</button>
      </div>
      <div id="chat-messages" style="flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:6px"></div>
      <div style="padding:10px 14px;border-top:1px solid #e8e8e8;display:flex;gap:8px;flex-shrink:0">
        <input id="chat-input" type="text" placeholder="Escribe un mensaje..." style="flex:1;border:1.5px solid #e0e0e0;border-radius:20px;padding:10px 16px;font-family:Montserrat,sans-serif;font-size:13px;outline:none" onkeydown="if(event.key==='Enter')enviarMensajeChat()">
        <button onclick="enviarMensajeChat()" style="background:#1a4fa0;color:white;border:none;border-radius:20px;padding:10px 18px;font-family:Montserrat,sans-serif;font-weight:900;font-size:13px;cursor:pointer">Enviar</button>
      </div>
    </div>`
  document.body.appendChild(modal)
  await _cargarMensajesChat()
  db.from('mensajes').update({ leido: true }).eq('pedido_id', pedidoId).eq('leido', false).then(() => {})
  if (_chatChannel) db.removeChannel(_chatChannel)
  _chatChannel = db.channel('chat-' + pedidoId)
    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'mensajes', filter: 'pedido_id=eq.' + pedidoId }, payload => _agregarBurbuja(payload.new))
    .subscribe()
}

async function _cargarMensajesChat() {
  const { data } = await db.from('mensajes').select('*').eq('pedido_id', _chatPedidoId).order('created_at', { ascending: true })
  const c = document.getElementById('chat-messages')
  if (!c) return
  ;(data || []).forEach(m => _agregarBurbuja(m, false))
  c.scrollTop = c.scrollHeight
}

function _agregarBurbuja(msg, scroll = true) {
  const c = document.getElementById('chat-messages')
  if (!c) return
  const esMio = msg.de === _chatRol
  const esAdmin = msg.de === 'admin'
  const label = document.createElement('div')
  label.style.cssText = `font-size:10px;font-weight:700;color:#aaa;align-self:${esMio ? 'flex-end' : 'flex-start'};margin-bottom:-2px`
  label.textContent = esAdmin ? '🛡️ Soporte' : msg.de === 'cliente' ? '👤 Cliente' : '🏍️ Repartidor'
  const burbuja = document.createElement('div')
  burbuja.style.cssText = `max-width:75%;padding:10px 14px;border-radius:${esMio ? '18px 18px 4px 18px' : '18px 18px 18px 4px'};font-family:Montserrat,sans-serif;font-size:13px;font-weight:600;align-self:${esMio ? 'flex-end' : 'flex-start'};background:${esMio ? '#1a4fa0' : esAdmin ? '#f59e0b' : '#f0f0f0'};color:${esMio || esAdmin ? 'white' : '#333'}`
  burbuja.textContent = msg.texto
  c.appendChild(label); c.appendChild(burbuja)
  if (scroll) c.scrollTop = c.scrollHeight
}

async function enviarMensajeChat() {
  const input = document.getElementById('chat-input')
  const texto = input.value.trim()
  if (!texto) return
  input.value = ''
  await db.from('mensajes').insert({ texto, de: 'repartidor', tipo: 'chat', pedido_id: _chatPedidoId })
}

function cerrarChat() {
  if (_chatChannel) { db.removeChannel(_chatChannel); _chatChannel = null }
  const m = document.getElementById('modal-chat'); if (m) m.remove()
}

// Realtime global para mensajes entrantes (badges + notificaciones)
db.channel('repa-mensajes-global')
  .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'mensajes' }, payload => {
    const msg = payload.new
    if (msg.de === 'repartidor') return
    const pid = msg.pedido_id
    if (!pid) return
    if (_chatPedidoId === pid && document.getElementById('modal-chat')) return // chat open
    _unread[pid] = (_unread[pid] || 0) + 1
    const badge = document.getElementById('chat-badge-' + pid)
    if (badge) { badge.textContent = _unread[pid]; badge.style.display = 'flex' }
    if (Notification.permission === 'granted') {
      new Notification('💬 Nuevo mensaje', { body: msg.texto || '...', icon: '/Icono_gp.png', tag: 'chat-' + pid })
    }
  })
  .subscribe()

if ('Notification' in window && Notification.permission === 'default') Notification.requestPermission()

init()
// ── Auto-refresh cada 30 segundos ──
setInterval(async () => {
  console.log('Auto-refresh ejecutando...')
  const { data: { session } } = await db.auth.getSession()
  console.log('Session:', session?.user?.email)
  if (session) cargarPedidos(session.user.email)
}, 10000)

// ── Avatar de perfil (repartidor) ────────────────────────────────────────────

let _repaFotoUrl = null

function _cargarAvatarRepartidor(repaData) {
  _repaFotoUrl = repaData.foto_perfil || null
  _renderAvatarRepartidor()
}

function _renderAvatarRepartidor() {
  const el = document.getElementById('repa-header-avatar')
  if (!el) return
  if (_repaFotoUrl) {
    el.innerHTML = '<img src="' + _repaFotoUrl + '" alt="perfil">'
  } else {
    const nombre = document.getElementById('delivery-nombre')?.textContent || '?'
    el.textContent = (nombre.replace('Hola, ','').charAt(0) || '?').toUpperCase()
  }
}

function _abrirModalFotoRepartidor() {
  const existing = document.getElementById('modal-foto-repa')
  if (existing) existing.remove()
  const modal = document.createElement('div')
  modal.id = 'modal-foto-repa'
  modal.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:20000;display:flex;align-items:center;justify-content:center;padding:20px'
  const fotoHtml = _repaFotoUrl
    ? '<img id="mfr-img" src="' + _repaFotoUrl + '" style="width:90px;height:90px;border-radius:50%;object-fit:cover;border:3px solid #1a4fa0;display:block;margin:0 auto 16px">'
    : '<div style="width:90px;height:90px;border-radius:50%;background:#1a4fa0;color:white;font-family:Montserrat,sans-serif;font-weight:900;font-size:32px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px">🏍️</div>'
  modal.innerHTML = '<div style="background:white;border-radius:20px;padding:24px;width:100%;max-width:320px;text-align:center">'
    + '<div style="font-family:Bebas Neue,sans-serif;font-size:22px;color:#1a4fa0;letter-spacing:2px;margin-bottom:16px">Mi foto de perfil</div>'
    + fotoHtml
    + '<input type="file" id="mfr-input" accept="image/*" style="display:none">'
    + '<label for="mfr-input" style="display:block;padding:11px;background:#1a4fa0;color:white;border-radius:10px;font-family:Montserrat,sans-serif;font-weight:900;font-size:13px;cursor:pointer;margin-bottom:10px">📷 Cambiar foto</label>'
    + '<div id="mfr-status" style="font-family:Montserrat,sans-serif;font-size:12px;color:#888;min-height:18px;margin-bottom:10px"></div>'
    + '<button onclick="document.getElementById(\'modal-foto-repa\').remove()" style="width:100%;padding:10px;border:1.5px solid #e0e0e0;border-radius:10px;background:white;font-family:Montserrat,sans-serif;font-weight:700;font-size:12px;cursor:pointer;color:#666">Cerrar</button>'
    + '</div>'
  document.body.appendChild(modal)
  modal.addEventListener('click', function(e) { if (e.target === modal) modal.remove() })
  document.getElementById('mfr-input').addEventListener('change', _subirFotoRepartidor)
}

async function _subirFotoRepartidor(e) {
  const file = e.target.files[0]
  if (!file || !_repaUserId) return
  const status = document.getElementById('mfr-status')
  if (status) status.textContent = '⏳ Subiendo...'
  const ext = file.name.split('.').pop() || 'jpg'
  const path = 'repartidores/' + _repaUserId + '.' + ext
  const { error: upError } = await db.storage.from('perfiles').upload(path, file, { upsert: true })
  if (upError) { if (status) status.textContent = '❌ ' + upError.message; return }
  const { data: urlData } = db.storage.from('perfiles').getPublicUrl(path)
  const publicUrl = urlData.publicUrl + '?t=' + Date.now()
  const { data: { session } } = await db.auth.getSession()
  if (session) {
    await db.from('repartidores').update({ foto_perfil: urlData.publicUrl }).eq('email', session.user.email)
  }
  _repaFotoUrl = publicUrl
  _renderAvatarRepartidor()
  const img = document.getElementById('mfr-img')
  if (img) img.src = publicUrl
  if (status) status.textContent = '✅ Foto actualizada'
}
