<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GUEPACK</title>
<link rel="apple-touch-icon" href="/Icono_gp.png">
<meta name="theme-color" content="#1a4fa0">
<link rel="icon" type="image/png" href="/Icono_gp.png">
<script src="/tenant-config.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0e3070;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .splash-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    animation: fadeIn 1.4s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes fadeIn {
    0% { opacity: 0; transform: scale(0.3); filter: blur(10px); }
    60% { opacity: 1; transform: scale(1.05); filter: blur(0px); }
    100% { opacity: 1; transform: scale(1); }
  }
  .logo {
    width: 85vw;
    max-width: 420px;
    filter: drop-shadow(0px 6px 16px rgba(0,0,0,0.25)) drop-shadow(0px 2px 6px rgba(240,90,26,0.15));
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-8px); }
  }
  .loader {
    margin-top: 48px;
    display: flex;
    gap: 8px;
  }
  .dot {
    width: 8px;
    height: 8px;
    background: #f05a1a;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; background: white; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
    40% { transform: scale(1); opacity: 1; }
  }
</style>
</head>
<body>
<div class="splash-container">
  <img src="/Splash_icon.png" class="logo" alt="GUEPACK">
  <div class="loader">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SUPABASE_URL = 'https://zkrnjdsnuyjaxxnluzmn.supabase.co'
const SUPABASE_KEY = 'sb_publishable_nde3IHFs-CJqqY0w5gV77g_FbtKtH7z'
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: { autoRefreshToken: true, persistSession: true, detectSessionInUrl: true }
})

async function init() {
  const promesaTenant = window.tenantConfigReady || Promise.resolve(null)
  const promesaEsperaSplash = new Promise(resolve => setTimeout(resolve, 2000))
  let session = null

  // Primer intento con la sesión que ya pudiera estar almacenada.
  const { data: { session: sesionInmediata }, error: errorSesion } = await db.auth.getSession()
  if (errorSesion) {
    console.warn('[auth] No fue posible comprobar la sesión inmediata:', errorSesion.message)
  }
  session = sesionInmediata

  // Si el callback OAuth sigue procesándose, espera SIGNED_IN durante un máximo de dos segundos.
  if (!session) {
    let suscripcionAuth = null
    await new Promise(resolve => {
      const finalizarEspera = () => {
        suscripcionAuth?.unsubscribe()
        resolve()
      }
      const temporizador = setTimeout(finalizarEspera, 2000)
      const { data } = db.auth.onAuthStateChange((evento, nuevaSesion) => {
        console.log('[auth] evento en splash:', evento, 'sesión:', nuevaSesion?.user?.email)
        if (evento === 'SIGNED_IN' && nuevaSesion) {
          session = nuevaSesion
          clearTimeout(temporizador)
          finalizarEspera()
        }
      })
      suscripcionAuth = data.subscription
    })
  }

  await promesaEsperaSplash

  if (session) {
    const { data: usuario, error } = await db.from('usuarios')
      .select('rol')
      .eq('user_id', session.user.id)
      .single()

    if (error) {
      console.warn('[auth] No fue posible consultar el rol; se abrirá la aplicación:', error.message)
    }

    if (usuario?.rol === 'admin') {
      window.location.href = 'admin.html'
    } else if (usuario?.rol === 'repartidor') {
      window.location.href = 'repartidor.html'
    } else {
      window.location.href = 'app.html'
    }
    return
  }

  const tenant = await promesaTenant
  const slug = String(tenant?.slug || '').toLowerCase()
  const plan = String(tenant?.plan || '').toLowerCase()

  if (slug === 'guepack') {
    window.location.href = 'landing.html.html'
  } else if (plan === 'basico') {
    window.location.href = 'login.html'
  } else {
    window.location.href = 'landing-tenant.html'
  }
}
init()
</script>
</body>
</html>
