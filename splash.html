<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GUEPACK</title>
<link rel="apple-touch-icon" href="/Icono_gp.png">
<meta name="theme-color" content="#1a4fa0">
<link rel="icon" type="image/png" href="/Icono_gp.png">
<script src="/tenant-config.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0e3070;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .splash-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    animation: fadeIn 1.4s cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes fadeIn {
    0% { opacity: 0; transform: scale(0.3); filter: blur(10px); }
    60% { opacity: 1; transform: scale(1.05); filter: blur(0px); }
    100% { opacity: 1; transform: scale(1); }
  }
  .logo {
    width: 85vw;
    max-width: 420px;
    filter: drop-shadow(0px 6px 16px rgba(0,0,0,0.25)) drop-shadow(0px 2px 6px rgba(240,90,26,0.15));
    animation: float 3s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-8px); }
  }
  .loader {
    margin-top: 48px;
    display: flex;
    gap: 8px;
  }
  .dot {
    width: 8px;
    height: 8px;
    background: #f05a1a;
    border-radius: 50%;
    animation: bounce 1.2s infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; background: white; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
    40% { transform: scale(1); opacity: 1; }
  }
</style>
</head>
<body>
<div class="splash-container">
  <img src="/Splash_icon.png" class="logo" alt="GUEPACK">
  <div class="loader">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</div>

<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
const SUPABASE_URL = 'https://zkrnjdsnuyjaxxnluzmn.supabase.co'
const SUPABASE_KEY = 'sb_publishable_nde3IHFs-CJqqY0w5gV77g_FbtKtH7z'
const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
  auth: { autoRefreshToken: true, persistSession: true, detectSessionInUrl: false }
})

async function init() {
  await new Promise(r => setTimeout(r, 2000))

  const promesaTenant = window.tenantConfigReady || Promise.resolve(null)
  let { data: { session } } = await db.auth.getSession()
  if (!session) {
    const { data: refreshData } = await db.auth.refreshSession()
    session = refreshData?.session
  }
  if (!session) {
    const tenant = await promesaTenant
    if (tenant?.plan === 'pro' || tenant?.plan === 'enterprise') {
      window.location.replace('/landing-tenant.html')
    } else {
      window.location.replace('/login.html')
    }
    return
  }

  const { data } = await db.from('usuarios').select('rol').eq('email', session.user.email).single()
  if (!data) { window.location.href = '/app.html'; return }

  if (data.rol === 'admin') {
    window.location.href = '/admin.html'
  } else if (data.rol === 'repartidor') {
    window.location.href = '/repartidor.html'
  } else {
    window.location.href = '/app.html'
  }
}
init()
</script>
</body>
</html>
